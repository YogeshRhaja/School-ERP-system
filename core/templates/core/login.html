<!DOCTYPE html>
<html>
<head>
    <title>Login | ABC School</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'core/employer_login.css' %}">
    <style>
/* Body & Page */
body {
    margin: 0;
    padding: 0;
    font-family: 'Inter', Arial, sans-serif;
    background: #f3f4f6;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* Page Wrapper */
.page-wrapper {
    width: 100%;
    max-width: 400px;
    padding: 20px;
}

/* Header */
.school-header {
    text-align: center;
    margin-bottom: 30px;
}

.school-header h1 {
    font-size: 28px;
    color: #4f46e5;
    margin-bottom: 5px;
    font-weight: 700;
}

.school-header p {
    font-size: 16px;
    color: #6b7280;
}

/* Login Box */
.login-box {
    background: #ffffff;
    padding: 30px 25px;
    border-radius: 12px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.08);
}

.login-box h2 {
    text-align: center;
    color: #1f2937;
    margin-bottom: 25px;
    font-weight: 600;
}

/* Input Fields */
.login-box label {
    display: block;
    margin-bottom: 6px;
    font-weight: 500;
    color: #374151;
}

.login-box input[type="text"],
.login-box input[type="password"] {
    width: 100%;
    padding: 10px 12px;
    margin-bottom: 18px;
    border: 1px solid #d1d5db;
    border-radius: 6px;
    font-size: 14px;
    transition: all 0.2s;
}

.login-box input:focus {
    border-color: #4f46e5;
    box-shadow: 0 0 0 2px rgba(79,70,229,0.2);
    outline: none;
}

/* Submit Button */
.login-box button {
    width: 100%;
    padding: 10px;
    background-color: #4f46e5;
    color: white;
    border: none;
    border-radius: 6px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
}

.login-box button:hover {
    background-color: #4338ca;
}

/* Error Messages */
.error-msg {
    background: #fee2e2;
    color: #b91c1c;
    padding: 10px;
    margin-bottom: 15px;
    border-radius: 6px;
    font-size: 14px;
    text-align: center;
}

/* Responsive */
@media (max-width: 500px) {
    .page-wrapper {
        padding: 10px;
    }
}
</style>
</head>
<body>
<div class="page-wrapper">
    <header class="school-header">
        <h1>ABC PUBLIC SCHOOL</h1>
        <p>Login Portal</p>
    </header>

    <div class="login-box">
        <h2>Login</h2>

        {% if messages %}
            {% for msg in messages %}
                <div class="error-msg">{{ msg }}</div>
            {% endfor %}
        {% endif %}

        <form method="post">
            {% csrf_token %}

            <label>Username</label>
            <input type="text" name="username" required>

            <label>Password</label>
            <input type="password" name="password" required>

            <button type="submit">Login</button>
        </form>

        <!-- ❌ Signup option removed -->
    </div>
</div>
</body>
</html>
