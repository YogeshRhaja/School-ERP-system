{% extends 'core/base.html' %}
{% block content %}

<style>
    .card {
        max-width: 500px;
        margin: auto;
        background: white;
        padding: 25px;
        border-radius: 8px;
        box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    h2 {
        text-align: center;
    }
    label {
        font-weight: bold;
        margin-top: 10px;
        display: block;
    }
    input, select {
        width: 100%;
        padding: 8px;
        margin-top: 5px;
    }
    button {
        margin-top: 15px;
        width: 100%;
        background: #0d6efd;
        color: white;
        padding: 10px;
        border: none;
        border-radius: 4px;
    }
</style>

<div class="card mt-4">
    <h2>Academic Year</h2>

    <form method="post">
        {% csrf_token %}

        <label>Year Name</label>
        {{ form.year_name }}

        <label>Start Date</label>
        {{ form.start_date }}

        <label>End Date</label>
        {{ form.end_date }}

        <label>Status</label>
        {{ form.status }}

        <button type="submit">Save Academic Year</button>
    </form>
</div>

{% endblock %}
